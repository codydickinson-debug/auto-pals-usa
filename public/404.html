<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Auto Pals USA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #faf6ed;
    color: #1a1f36;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap {
    max-width: 520px;
    text-align: center;
  }
  .num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(96px, 22vw, 156px);
    font-weight: 700;
    color: #0f2557;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 700;
    color: #0f2557;
    margin-bottom: 12px;
  }
  p {
    font-size: 15px;
    color: #5a6480;
    line-height: 1.65;
    margin-bottom: 28px;
  }
  .btn {
    display: inline-block;
    background: #0f2557;
    color: #faf6ed;
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: opacity 0.15s;
    margin: 4px;
  }
  .btn:hover { opacity: 0.85; }
  .btn-secondary {
    background: transparent;
    color: #0f2557;
    border: 1px solid #e4dcc6;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>That page wandered off</h1>
  <p>Looks like the page you're looking for doesn't exist or got moved. Let's get you somewhere useful.</p>
  <a href="/home.html" class="btn">Back to home</a>
  <a href="/form.html?form=1" class="btn btn-secondary">Submit a request</a>
</div>
</body>
</html>
